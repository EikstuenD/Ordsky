<!DOCTYPE html>
<html>
<head>
    <title>Ordsky</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eef2f7; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #canvas-container { width: 100%; height: 500px; position: relative; margin-top: 20px; border: 1px solid #eee; background: white; cursor: pointer; }
        canvas { width: 100%; height: 100%; }
        input { padding: 12px; width: 50%; border: 2px solid #ddd; border-radius: 25px; outline: none; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin: 5px; }
        
        /* Admin-panel er skjult som standard */
        #admin-panel { display: none; background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ffeeba; }
        .btn-reset { background: #dc3545; }
        .admin-msg { color: #856404; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="admin-panel">
            <p class="admin-msg"><strong>Lærer-modus aktivert:</strong> Klikk på et ord i skyen for å slette det helt, eller bruk knappen under.</p>
            <button class="btn-reset" onclick="resetCloud()">Tøm hele ordskyen</button>
        </div>

        <h1>☁️ Klassens Ordsky</h1>
        
        <div class="input-area">
            <input type="text" id="wordInput" placeholder="Skriv et ord..." maxlength="20">
            <button onclick="sendWord()">Send inn!</button>
        </div>

        <div id="canvas-container">
            <canvas id="wordCloudCanvas"></canvas>
        </div>
    </div>

    <script>
        // --- DIN KONFIGURASJON ---
         const firebaseConfig = {
  apiKey: "AIzaSyAjXuvWo4AH8yQPJwDXkcOZGgW1JTNGMqY",
  authDomain: "ordsky-github.firebaseapp.com",
    databaseURL: "https://ordsky-github-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "ordsky-github",
  storageBucket: "ordsky-github.firebasestorage.app",
  messagingSenderId: "527447428201",
  appId: "1:527447428201:web:00fe7de5f74f13d20426f8",
  measurementId: "G-TNMQZN3XTG"
};

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Sjekk om vi er i admin-modus via URL: ?admin=hemmelig
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'hemmelig'; // Du kan bytte ut 'hemmelig' med ditt eget passord

        if (isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
        }

        function sendWord() {
            const input = document.getElementById('wordInput');
            const word = input.value.trim().toLowerCase();
            if (word) {
                database.ref('words').push(word);
                input.value = '';
            }
        }

        // Funksjon for å tømme hele databasen
        function resetCloud() {
            if (confirm("Er du sikker på at du vil slette ALLE ordene?")) {
                database.ref('words').remove();
            }
        }

        // Funksjon for å slette ett spesifikt ord (alle forekomster)
        function deleteWord(wordToDelete) {
            if (isAdmin && confirm(`Vil du fjerne ordet "${wordToDelete}"?`)) {
                const ref = database.ref('words');
                ref.once('value', (snapshot) => {
                    snapshot.forEach((childSnapshot) => {
                        if (childSnapshot.val() === wordToDelete) {
                            childSnapshot.ref.remove();
                        }
                    });
                });
            }
        }

        database.ref('words').on('value', (snapshot) => {
            const data = snapshot.val();
            const canvas = document.getElementById('wordCloudCanvas');
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;

            if (!data) {
                const ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ccc";
                ctx.textAlign = "center";
                ctx.fillText("Skyen er tom. Venter på ord...", canvas.width/2, canvas.height/2);
                return;
            }

            const wordsArray = Object.values(data);
            const counts = {};
            wordsArray.forEach(w => counts[w] = (counts[w] || 0) + 1);

            const list = Object.entries(counts).map(([word, count]) => [word, 10 + (count * 15)]);

            WordCloud(canvas, { 
                list: list,
                gridSize: 10,
                weightFactor: 1,
                fontFamily: 'sans-serif',
                color: 'random-dark',
                rotateRatio: 0,
                backgroundColor: '#fff',
                click: function(item) {
                    if (isAdmin) {
                        deleteWord(item[0]);
                    }
                }
            });
        });
    </script>
</body>
</html>
