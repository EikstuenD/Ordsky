<!DOCTYPE html>
<html>
<head>
    <title>Klassens Ordsky</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; }
        #canvas-container { width: 80%; height: 500px; margin: 20px auto; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        canvas { width: 100%; height: 100%; }
        .input-area { margin-top: 20px; }
        input { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Hva tenker dere om koding?</h1>
    
    <div class="input-area">
        <input type="text" id="wordInput" placeholder="Skriv et ord..." maxlength="20">
        <button onclick="sendWord()">Send inn!</button>
    </div>

    <div id="canvas-container">
        <canvas id="wordCloudCanvas"></canvas>
    </div>

    <script>
        // DIN FIREBASE CONFIG HER (Lim inn det du kopierte i Steg 1)
        const firebaseConfig = {
  apiKey: "AIzaSyAjXuvWo4AH8yQPJwDXkcOZGgW1JTNGMqY",
  authDomain: "ordsky-github.firebaseapp.com",
  projectId: "ordsky-github",
  storageBucket: "ordsky-github.firebasestorage.app",
  messagingSenderId: "527447428201",
  appId: "1:527447428201:web:00fe7de5f74f13d20426f8",
  measurementId: "G-TNMQZN3XTG"
};

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Funksjon for å sende ord
        function sendWord() {
            const input = document.getElementById('wordInput');
            const word = input.value.trim().toLowerCase();
            if (word) {
                database.ref('words').push(word);
                input.value = '';
            }
        }

        // Lytt etter endringer og oppdater ordskyen
        database.ref('words').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Tell antall forekomster av hvert ord
            const wordsArray = Object.values(data);
            const counts = {};
            wordsArray.forEach(w => counts[w] = (counts[w] || 0) + 1);

            // Formatér for WordCloud2.js: [['ord', vekt], ['ord2', vekt]]
            const list = Object.entries(counts).map(([word, count]) => [word, count * 10]);

            // Tegn ordskyen
            const canvas = document.getElementById('wordCloudCanvas');
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
            
            WordCloud(canvas, { 
                list: list,
                gridSize: 10,
                weightFactor: 2,
                fontFamily: 'sans-serif',
                color: 'random-dark',
                rotateRatio: 0.5,
                backgroundColor: '#fff'
            });
        });
    </script>
</body>
</html>
